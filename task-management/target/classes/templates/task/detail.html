<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>任务详情</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/natural.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-natural">
    <div class="container">
        <a class="navbar-brand" href="#">🌿 学习任务管理</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" th:href="${session.user.role == 'ADMIN' ? '/admin/dashboard' : '/task/list'}"
               th:text="${session.user.role == 'ADMIN' ? '首页' : '我的任务'}"></a>
            <a class="nav-link" href="/user/logout">退出</a>
        </div>
    </div>
</nav>
<div class="container section-spacing">
    <div class="row">
        <div class="col-lg-8">
            <div class="card-natural mb-4">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <h5 class="mb-0" th:text="${task.title}"></h5>
                    <span th:if="${task.status == 'PENDING'}" class="badge-pending">待处理</span>
                    <span th:if="${task.status == 'IN_PROGRESS'}" class="badge-progress">进行中</span>
                    <span th:if="${task.status == 'COMPLETED'}" class="badge-completed">已完成</span>
                </div>
                <div class="card-body p-4">
                    <p class="mb-2"><strong>分类：</strong><span th:text="${task.categoryName ?: '未分类'}"></span></p>
                    <p class="mb-3"><strong>描述：</strong></p>
                    <p class="ps-3 text-muted" th:text="${task.description ?: '暂无描述'}"></p>
                    <div th:if="${task.imageUrl}" class="mt-4">
                        <strong>附件图片：</strong>
                        <div class="mt-2">
                            <img th:src="${task.imageUrl}" class="img-natural" style="max-width: 100%; max-height: 400px;">
                        </div>
                    </div>
                    <p class="text-muted mt-4 mb-0">
                        <small>创建时间：<span th:text="${#temporals.format(task.createdTime, 'yyyy-MM-dd HH:mm')}"></span></small>
                    </p>
                </div>
            </div>
            
            <div class="card-natural">
                <div class="card-header">
                    <h6 class="mb-0">💬 留言/备注</h6>
                </div>
                <div class="card-body p-4">
                    <div th:each="c : ${comments}" class="comment-item">
                        <div class="d-flex justify-content-between mb-1">
                            <strong th:text="${c.username}"></strong>
                            <small class="text-muted" th:text="${#temporals.format(c.createdTime, 'yyyy-MM-dd HH:mm')}"></small>
                        </div>
                        <p class="mb-0" th:text="${c.content}"></p>
                    </div>
                    <div th:if="${#lists.isEmpty(comments)}" class="text-center text-muted py-3">
                        暂无留言
                    </div>
                    <form id="commentForm" class="mt-4">
                        <input type="hidden" name="taskId" th:value="${task.id}">
                        <div class="mb-3">
                            <textarea name="content" class="form-control form-control-natural" rows="2" placeholder="添加留言或备注..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-moss btn-sm">提交留言</button>
                    </form>
                </div>
            </div>

            <a th:href="${session.user.role == 'ADMIN' ? '/admin/tasks' : '/task/list'}" class="btn btn-sand mt-4">← 返回列表</a >
        </div>
    </div>
</div>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    $('#commentForm').submit(function(e) {
        e.preventDefault();
        $.post('/task/comment', $(this).serialize(), function(res) {
            if (res.code === 200) location.reload();
            else alert(res.msg);
        });
    });
</script>
</body>
</html>
