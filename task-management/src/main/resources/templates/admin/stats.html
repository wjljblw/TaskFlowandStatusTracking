<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>统计报表</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/natural.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-natural">
    <div class="container">
        <a class="navbar-brand" href="#">🍃 管理后台</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/admin/dashboard">首页</a>
            <a class="nav-link" href="/admin/tasks">任务管理</a>
            <a class="nav-link" href="/admin/categories">分类管理</a>
            <a class="nav-link" href="/admin/stats">统计报表</a>
            <a class="nav-link" href="/user/logout">退出</a>
        </div>
    </div>
</nav>
<div class="container section-spacing">
    <h4 class="page-title mb-4">统计报表</h4>
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card-natural h-100">
                <div class="card-header">
                    <h6 class="mb-0">📊 任务概览</h6>
                </div>
                <div class="card-body">
                    <table class="table mb-0">
                        <tr>
                            <td class="border-0 ps-0">📋 总任务数</td>
                            <td class="border-0 text-end fw-bold" th:text="${stats.total}"></td>
                        </tr>
                        <tr>
                            <td class="ps-0">⏳ 待处理</td>
                            <td class="text-end fw-bold" th:text="${stats.pending}"></td>
                        </tr>
                        <tr>
                            <td class="ps-0">🔄 进行中</td>
                            <td class="text-end fw-bold" th:text="${stats.inProgress}"></td>
                        </tr>
                        <tr>
                            <td class="border-0 ps-0">✅ 已完成</td>
                            <td class="border-0 text-end fw-bold text-success" th:text="${stats.completed}"></td>
                        </tr>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card-natural h-100">
                <div class="card-header">
                    <h6 class="mb-0">🎯 完成率</h6>
                </div>
                <div class="card-body text-center py-5">
                    <h1 class="display-3 mb-3" style="color: var(--moss-green);" th:text="${stats.completionRate} + '%'">0%</h1>
                    <p class="text-muted mb-4">任务完成率</p>
                    <div class="progress-natural mx-auto" style="max-width: 400px;">
                        <div class="progress-bar" role="progressbar" 
                             th:style="'width:' + ${stats.completionRate} + '%'"
                             th:text="${stats.completionRate} + '%'"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
