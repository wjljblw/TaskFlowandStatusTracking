<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的任务</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/natural.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-natural">
    <div class="container">
        <a class="navbar-brand" href="#">🌿 学习任务管理</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/task/list">我的任务</a>
            <a class="nav-link" href="/task/stats">统计</a>
            <a class="nav-link" href="/user/logout">退出</a>
        </div>
    </div>
</nav>
<div class="container section-spacing">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="page-title mb-0">我的任务列表</h4>
        <a href="/task/create" class="btn btn-moss">+ 新建任务</a>
    </div>
    <div class="table-natural">
        <table class="table mb-0">
            <thead>
                <tr><th>标题</th><th>分类</th><th>状态</th><th>创建时间</th><th>操作</th></tr>
            </thead>
            <tbody>
            <tr th:each="task : ${tasks}">
                <td th:text="${task.title}"></td>
                <td th:text="${task.categoryName ?: '未分类'}"></td>
                <td>
                    <span th:if="${task.status == 'PENDING'}" class="badge-pending">待处理</span>
                    <span th:if="${task.status == 'IN_PROGRESS'}" class="badge-progress">进行中</span>
                    <span th:if="${task.status == 'COMPLETED'}" class="badge-completed">已完成</span>
                </td>
                <td th:text="${#temporals.format(task.createdTime, 'yyyy-MM-dd HH:mm')}"></td>
                <td><a th:href="@{/task/detail/{id}(id=${task.id})}" class="btn btn-lake btn-sm">查看详情</a></td>
            </tr>
            <tr th:if="${#lists.isEmpty(tasks)}">
                <td colspan="5" class="text-center py-4 text-muted">暂无任务，点击右上角创建新任务</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
