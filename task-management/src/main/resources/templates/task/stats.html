<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的统计</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/natural.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-natural">
    <div class="container">
        <a class="navbar-brand" href="#">🌿 学习任务管理</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/task/list">我的任务</a>
            <a class="nav-link" href="/task/stats">统计</a>
            <a class="nav-link" href="/user/logout">退出</a>
        </div>
    </div>
</nav>
<div class="container section-spacing">
    <h4 class="page-title mb-4">我的任务完成情况</h4>
    <div class="row g-4">
        <div class="col-md-3">
            <div class="stat-card stat-card-lake">
                <h3 th:text="${stats.total}">0</h3>
                <p>📋 总任务数</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card stat-card-rock">
                <h3 th:text="${stats.pending}">0</h3>
                <p>⏳ 待处理</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card stat-card-earth">
                <h3 th:text="${stats.inProgress}">0</h3>
                <p>🔄 进行中</p>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card stat-card-moss">
                <h3 th:text="${stats.completed}">0</h3>
                <p>✅ 已完成</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
